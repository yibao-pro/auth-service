syntax = "proto3";

package auth.v1;

service AuthService {
  rpc Healthz(HealthzRequest) returns (HealthzResponse);
  rpc Register(RegisterRequest) returns (AuthResponse);
  rpc Login(LoginRequest) returns (AuthResponse);
  rpc Me(MeRequest) returns (MeResponse);
}

message HealthzRequest {}

message HealthzResponse {
  string status = 1;
  string request_id = 2;
  string service = 3;
  int32 port = 4;
  string message = 5;
}

message RegisterRequest {
  string username = 1;
  string password = 2;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message AuthResponse {
  string status = 1;
  string request_id = 2;
  string user_id = 3;
  string token = 4;
  string username = 5;
}

message MeRequest {
  string token = 1;
}

message MeResponse {
  string status = 1;
  string request_id = 2;
  string user_id = 3;
  string username = 4;
}
