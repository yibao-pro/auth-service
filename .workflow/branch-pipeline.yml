version: '1.0'
name: branch-pipeline
displayName: BranchPipeline
stages:
  - stage:
    name: compile
    displayName: 编译
    steps:
      - step: build@python
        name: build_python
        displayName: Docker Compose 构建与测试
        pythonVersion: '3.10'
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./
        commands:
          - python3 --version
          - python3 -m py_compile main.py api/app.py src/*.py scripts/*.py
          - |
              set -euo pipefail
              cp .env.example .env
              export AUTH_SERVICE_TEST_HOST=127.0.0.1
              export AUTH_SERVICE_PORT=8004

              docker compose config
              docker compose down -v --remove-orphans || true
              trap 'docker compose down -v --remove-orphans || true' EXIT
              docker compose build
              docker compose up -d

              if ! python3 scripts/ci_smoke_test.py; then
                docker compose logs auth-service postgres || true
                exit 1
              fi
      - step: publish@general_artifacts
        name: publish_general_artifacts
        displayName: 上传制品
        dependArtifact: BUILD_ARTIFACT
        artifactName: output
        dependsOn: build_python
  - stage:
    name: release
    displayName: 发布
    steps:
      - step: publish@release_artifacts
        name: publish_release_artifacts
        displayName: 发布
        dependArtifact: output
        version: '1.0.0.0'
        autoIncrement: true
triggers:
  push:
    branches:
      exclude:
        - master
      include:
        - .*
